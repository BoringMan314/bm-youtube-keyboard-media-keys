<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title></title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 220px;
      margin: 0;
      padding: 12px 14px 14px;
      font-family: system-ui, "Segoe UI", "Microsoft JhengHei", "Hiragino Sans", sans-serif;
      font-size: 13px;
      color: #1a1a1a;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 600;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .row label {
      flex: 1;
      line-height: 1.35;
      cursor: pointer;
      user-select: none;
    }
    input[type="checkbox"]#toggle {
      appearance: none;
      width: 40px;
      height: 22px;
      border-radius: 11px;
      background: #ccc;
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    input[type="checkbox"]#toggle::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      top: 2px;
      left: 2px;
      transition: transform 0.15s;
      box-shadow: 0 1px 2px rgba(0,0,0,.2);
    }
    input[type="checkbox"]#toggle:checked {
      background: #1a73e8;
    }
    input[type="checkbox"]#toggle:checked::after {
      transform: translateX(18px);
    }
    input[type="checkbox"]#toggle:focus-visible {
      outline: 2px solid #1a73e8;
      outline-offset: 2px;
    }
    button.linklike {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      background: #f8f9fa;
      font: inherit;
      color: #1a73e8;
      cursor: pointer;
    }
    button.linklike:hover {
      background: #f1f3f4;
    }
    .hint {
      margin: 8px 0 0;
      font-size: 11px;
      color: #5f6368;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1 id="popup-heading"></h1>
  <div class="row">
    <label for="toggle" id="popup-enable-label"></label>
    <input type="checkbox" id="toggle" />
  </div>
  <button type="button" class="linklike" id="open-help"></button>
  <p class="hint" id="popup-hint"></p>
  <script src="popup.js"></script>
</body>
</html>
